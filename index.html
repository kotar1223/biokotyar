<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTРЇR Terminal</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #a31a1a;
            --font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #terminal {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .line { margin-bottom: 8px; white-space: pre-wrap; }
        .input-line { display: flex; margin-top: 5px; align-items: center; }
        .prompt { color: #ff3333; margin-right: 10px; font-weight: bold; }

        input {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-family: var(--font-family);
            font-size: 1.1rem;
            outline: none;
            flex-grow: 1;
        }

        .ascii-header { color: #ff4d4d; font-weight: bold; margin-bottom: 10px; }
        .link { color: #ff3333; text-decoration: none; border-bottom: 1px dashed #ff3333; }
        
        #kitty-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 999;
        }
        #kitty-overlay img { max-width: 90%; max-height: 80%; border: 2px solid #a31a1a; }
    </style>
</head>
<body>

    <div id="terminal">
        <div id="output"></div>
        <div class="input-line">
            <span class="prompt">user@kotyar:~$</span>
            <input type="text" id="command-input" autofocus autocomplete="off">
        </div>
    </div>

    <div id="kitty-overlay" onclick="this.style.display='none'">
        <img src="" id="kitty-img">
        <p>Click to close</p>
    </div>

    <script>
        const input = document.getElementById('command-input');
        const output = document.getElementById('output');
        const kittyOverlay = document.getElementById('kitty-overlay');
        const kittyImg = document.getElementById('kitty-img');

        const myLinks = {
            tiktok: "https://www.tiktok.com/@kotar12233",
            github: "https://github.com/your-username", 
            discordServer: "https://discord.gg/yfcENEXQM7",
            telegram: "https://t.me/kotyatgk1",
            spotify: "https://open.spotify.com/playlist/5SEnGcE7cNuecQZdzyLnfi?si=IrZhJyEIQ2utMefwUuUInQ",
            steam: "https://steamcommunity.com/id/KOARASTIM"
        };

        const commands = {
            help: () => `Available commands:
  bio    - Show my info and links
  player - Play music (broken)
  kitty  - Show a cat
  clear  - Clear screen`,

            bio: () => {
                const ascii = `
в–€в–€в•—  в–€в–€в•— в–€в–€в–€в–€в–€в–€в•— в–€в–€в–€в–€в–€в–€в–€в–€в•—в–€в–€в•—   в–€в–€в•— в–€в–€в–€в–€в–€в•— в–€в–€в–€в–€в–€в–€в•— 
в–€в–€в•‘ в–€в–€в•”в•ќв–€в–€в•”в•ђв•ђв•ђв–€в–€в•—в•љв•ђв•ђв–€в–€в•”в•ђв•ђв•ќв•љв–€в–€в•— в–€в–€в•”в•ќв–€в–€в•”в•ђв•ђв–€в–€в•—в–€в–€в•”в•ђв•ђв–€в–€в•—
в–€в–€в–€в–€в–€в•”в•ќ в–€в–€в•‘   в–€в–€в•‘   в–€в–€в•‘    в•љв–€в–€в–€в–€в•”в•ќ в–€в–€в–€в–€в–€в–€в–€в•‘в–€в–€в–€в–€в–€в–€в•”в•ќ
в–€в–€в•”в•ђв–€в–€в•— в–€в–€в•‘   в–€в–€в•‘   в–€в–€в•‘     в•љв–€в–€в•”в•ќ  в–€в–€в•”в•ђв•ђв–€в–€в•‘в–€в–€в•”в•ђв•ђв–€в–€в•—
в–€в–€в•‘  в–€в–€в•—в•љв–€в–€в–€в–€в–€в–€в•”в•ќ   в–€в–€в•‘      в–€в–€в•‘   в–€в–€в•‘  в–€в–€в•‘в–€в–€в•‘  в–€в–€в•‘
в•љв•ђв•ќ  в•љв•ђв•ќ в•љв•ђв•ђв•ђв•ђв•ђв•ќ    в•љв•ђв•ќ      в•љв•ђв•ќ   в•љв•ђв•ќ  в•љв•ђв•ќв•љв•ђв•ќ  в•љв•ђв•ќ`;
                return `<pre class="ascii-header">${ascii}</pre>
<div>
  [1] TikTok:   <a href="${myLinks.tiktok}" class="link" target="_blank">TikTok Profile</a><br>
  [2] GitHub:   <a href="${myLinks.github}" class="link" target="_blank">GitHub</a><br>
  [3] DServer:  <a href="${myLinks.discordServer}" class="link" target="_blank">Join Server</a><br>
  [4] Telegram: <a href="${myLinks.telegram}" class="link" target="_blank">Channel</a><br>
  [5] Spotify:  <a href="${myLinks.spotify}" class="link" target="_blank">Playlist</a><br>
  [6] Steam:    <a href="${myLinks.steam}" class="link" target="_blank">Steam Profile</a>
</div>`;
            },

            player: () => `
<div style="margin-top:10px">
    <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGvPBm9s?utm_source=generator&theme=0" 
    width="100%" height="152" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
</div>`,

            kitty: () => {
                kittyImg.src = "https://cataas.com/cat/funny?t=" + new Date().getTime();
                kittyOverlay.style.display = 'flex';
                return "Opening kitty.exe...";
            },

            clear: () => {
                output.innerHTML = "";
                return null;
            }
        };

        function printLine(text, isCommand = false) {
            if (text === null) return;
            const line = document.createElement('div');
            line.className = 'line';
            line.innerHTML = isCommand ? `<span class="prompt">user@kotyar:~$</span> ${text}` : text;
            output.appendChild(line);
            document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = input.value.trim().toLowerCase();
                printLine(val, true);
                if (commands[val]) {
                    printLine(commands[val]());
                } else if (val !== "") {
                    printLine("Command not found: " + val + ". Type 'help' for commands.");
                }
                input.value = "";
            }
        });

        document.addEventListener('click', () => input.focus());

        window.onload = () => {
            printLine("Type 'help' to see available commands.");
            input.focus();
        };
    </script>
</body>
</html>
